<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expenzo - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #9efdb9;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="relative min-h-screen font-sans flex items-center justify-center px-4">

  <!-- Green Fade Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- Login Box Container -->
  <div class="glass w-full max-w-4xl overflow-hidden grid grid-cols-1 md:grid-cols-2 fade-in p-4">

    <!-- Left Panel with Illustration -->
    <div class="bg-green-50 flex items-center justify-center p-6 rounded-xl">
      <img src="1000255601.jpg" alt="User Illustration" class="w-max h-max" />
    </div>

    <!-- Right Panel - Login Form -->
    <div class="p-10">
      <h2 class="text-3xl font-bold text-green-700 mb-6 text-center">Login</h2>
      <form id="loginForm">
        <div class="mb-6">
          <label for="username" class="block mb-2 text-lg font-medium">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <div class="mb-6">
          <label for="password" class="block mb-2 text-lg font-medium">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-md text-base font-semibold transition">
          Login
        </button>
      </form>
      <p class="text-center text-sm text-gray-600 mt-4">
        Don't have an account?
        <a href="signup.html" class="text-green-600 hover:underline">Sign up</a>
      </p>
    </div>
  </div>

  <!-- Login Script with Backend Request -->
  <script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const correctUsername = "user";
    const correctPassword = "user123";

    if (username === correctUsername && password === correctPassword) {
        localStorage.setItem("userId", "1");
        alert("Login successful!");
        window.location.href = "dash.html";
    } else {
        alert("Invalid username or password");
    }
});
</script>

</body>
</html>
