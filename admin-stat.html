<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      background: url('') no-repeat center center fixed;
      background-size: cover;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
    }
  </style>
</head>
<body class="min-h-screen text-gray-800">

  <!-- Green Blur Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- Navigation Bar -->
  <nav class="w-full bg-white/80 backdrop-blur-md shadow-md fixed top-0 left-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="text-2xl font-bold text-green-600">Expenzo</div>
      <div class="hidden md:flex space-x-6 text-gray-700 font-medium">
        <a href="admin-dash.html" class="hover:text-green-600">Dashboard</a>
        <a href="alogout.html" class="hover:text-green-600">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Spacer for fixed navbar -->
  <div class="pt-24"></div>

  <!-- Main Content -->
  <main class="px-4 max-w-3xl mx-auto py-10">
    <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-8">
      <h2 class="text-2xl font-bold text-green-700 mb-6 text-center">Total Users Signed In</h2>

      <div class="bg-white p-10 rounded-2xl shadow text-center mb-8">
        <p id="totalUsers" class="text-6xl font-bold text-green-600">0</p>
        <p class="text-lg mt-2 text-gray-600">Users currently registered in the system.</p>
      </div>

      <h3 class="text-xl font-semibold text-green-700 mb-4">Signed-in Users</h3>

      <div id="userList" class="bg-white rounded-2xl shadow p-6 space-y-4">
        <!-- User entries will be inserted here by JS -->
      </div>

      <div class="text-right mt-6">
        <a href="admin-dash.html" class="text-green-600 hover:underline text-sm">← Back to Dashboard</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-green-100 py-10 mt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <div class="mb-4">
        <i class="fas fa-coins text-3xl text-green-600"></i>
        <h3 class="text-2xl font-bold text-green-700 mt-2">Expenzo</h3>
      </div>
      <p class="text-gray-600 text-sm flex justify-center items-center gap-2">
        <i class="far fa-copyright"></i>
        2025 Expenzo. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Script to fetch and render user data -->
  <script>
    async function loadUserStats() {
      try {
        const response = await fetch('http://localhost:3000/admin/users');
        const data = await response.json();

        document.getElementById('totalUsers').textContent = data.total;

        const userList = document.getElementById('userList');
        userList.innerHTML = '';

        data.users.forEach((user) => {
          const isActive = user.status === 'allowed';

          const userDiv = document.createElement('div');
          userDiv.className = 'flex justify-between items-center border-b pb-4';

          userDiv.innerHTML = `
            <div>
              <p class="font-semibold text-lg">Username: ${user.username}</p>
              <p class="text-sm text-gray-500">Email: ${user.email}</p>
            </div>
            <span class="text-sm px-3 py-1 rounded-full ${
              isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
            }">
              ${isActive ? 'Active' : 'Inactive'}
            </span>
          `;

          userList.appendChild(userDiv);
        });
      } catch (err) {
        console.error('Error loading users:', err);
        alert('Failed to load user stats. Please try again later.');
      }
    }

    loadUserStats();
  </script>
</body>
</html>
