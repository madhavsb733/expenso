<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Categorize</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: url('https://i.pinimg.com/736x/be/0f/b1/be0fb11e5a4caa5493c0080b66656cdf.jpg') no-repeat center center fixed;
      background-size: 50%;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    th {
      background-color: #2e7d32;
      color: #efebeb;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 10px;
      border: 1px solid #f0f5f0;
    }

    tfoot td {
      font-weight: bold;
      background-color: #e8f5e9;
    }
  </style>
</head>
<body class="min-h-screen text-gray-800">

  <!-- Green Overlay -->
  <div class="absolute inset-0 bg-green-900/40 backdrop-blur-sm z-0"></div>

  <!-- Main Content -->
  <div class="relative z-10">

    <!-- Navigation Bar -->
    <nav class="w-full bg-white/80 backdrop-blur-md shadow-md fixed top-0 left-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="text-2xl font-bold text-green-600">Expenzo</div>
        <div class="hidden md:flex space-x-6 text-gray-700 font-medium">
          <a href="dash.html" class="hover:text-green-600">Dashboard</a>
          <a href="a.html" class="hover:text-green-600">Add Expense</a>
          <a href="c.html" class="hover:text-green-600">Categorize</a>
          <a href="visual.html" class="hover:text-green-600">Visualization</a>
          <a href="logout.html" class="hover:text-green-600">Logout</a>
        </div>
      </div>
    </nav>

    <!-- Spacer -->
    <div class="pt-24"></div>

    <!-- Categorize Section -->
    <main class="px-4 py-10 fade-in">
      <div class="max-w-5xl mx-auto glass p-8">
        <h1 class="text-2xl font-bold text-green-700 mb-6 text-center">Categorize</h1>

        <div class="filter text-center mb-8">
          <select id="categoryFilter" onchange="filterExpenses()" class="px-4 py-2 border border-gray-300 rounded">
            <option value="All">All Categories</option>
          </select>
        </div>

        <div class="overflow-x-auto">
          <table id="expenseTable" class="min-w-full bg-white border border-gray-200 rounded-lg overflow-hidden">
            <thead>
              <tr><th>Date</th><th>Category</th><th>Description</th><th>Amount (₹)</th></tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr><td colspan="3">Total</td><td>₹<span id="footerTotal">0.00</span></td></tr>
            </tfoot>
          </table>
        </div>

        <div class="summary text-center mt-6 text-green-700 font-semibold text-lg">
          <strong>Total Expenses:</strong> ₹<span id="totalExpenses">0.00</span>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-green-100 py-10">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <div class="mb-4">
          <i class="fas fa-coins text-3xl text-green-600"></i>
          <h3 class="text-2xl font-bold text-green-700 mt-2">Expenzo</h3>
        </div>
        <p class="text-gray-600 text-sm flex justify-center items-center gap-2">
          <i class="far fa-copyright"></i>
          2025 Expenzo. All rights reserved.
        </p>
      </div>
    </footer>

  </div>

  <!-- Script -->
  <script>
    let allExpenses = [];

    function populateTable(data) {
      const tbody = document.querySelector("#expenseTable tbody");
      tbody.innerHTML = "";
      data.forEach(exp => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${exp.date}</td>
          <td>${exp.category}</td>
          <td>${exp.name}</td>
          <td>${parseFloat(exp.amount).toFixed(2)}</td>
        `;
        tbody.appendChild(row);
      });
      calculateTotal();
    }

    function calculateTotal() {
      let total = 0;
      document.querySelectorAll("#expenseTable tbody tr").forEach(row => {
        if (row.style.display !== "none") {
          const val = parseFloat(row.cells[3].textContent);
          if (!isNaN(val)) total += val;
        }
      });
      document.getElementById("totalExpenses").textContent = total.toFixed(2);
      document.getElementById("footerTotal").textContent = total.toFixed(2);
    }

    function filterExpenses() {
      const filter = document.getElementById("categoryFilter").value;
      const filtered = filter === "All" ? allExpenses : allExpenses.filter(e => e.category === filter);
      populateTable(filtered);
    }

    async function loadExpenses() {
      const userId = localStorage.getItem("userId");
      if (!userId) {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch(`/expenses/${userId}`);
        const data = await res.json();
        allExpenses = data;
        populateTable(allExpenses);

        const categories = [...new Set(data.map(e => e.category))];
        const filterSelect = document.getElementById("categoryFilter");
        categories.forEach(cat => {
          const opt = document.createElement("option");
          opt.value = cat;
          opt.textContent = cat;
          filterSelect.appendChild(opt);
        });

      } catch (err) {
        console.error('Error loading expenses:', err);
      }
    }

    loadExpenses();
  </script>
</body>
</html>
