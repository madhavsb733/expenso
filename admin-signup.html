<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expenzo - Admin Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="relative min-h-screen font-sans">

  <!-- 🌿 Background Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- Spacer & Sign Up Form -->
  <div class="pt-28 px-4">
    <div class="max-w-md mx-auto glass p-8">
      <h2 class="text-3xl font-bold text-green-700 mb-6 text-center">Admin Sign Up</h2>
      <form id="adminSignUpForm">
        <div class="mb-6">
          <label for="adminName" class="block mb-2 text-lg font-medium">Full Name</label>
          <input
            type="text"
            id="adminName"
            name="adminName"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <div class="mb-6">
          <label for="adminEmail" class="block mb-2 text-lg font-medium">Email Address</label>
          <input
            type="email"
            id="adminEmail"
            name="adminEmail"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <div class="mb-6">
          <label for="adminUsername" class="block mb-2 text-lg font-medium">Username</label>
          <input
            type="text"
            id="adminUsername"
            name="adminUsername"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <div class="mb-6">
          <label for="adminPassword" class="block mb-2 text-lg font-medium">Password</label>
          <input
            type="password"
            id="adminPassword"
            name="adminPassword"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <div class="mb-6">
          <label for="adminConfirmPassword" class="block mb-2 text-lg font-medium">Confirm Password</label>
          <input
            type="password"
            id="adminConfirmPassword"
            name="adminConfirmPassword"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-md text-base font-semibold transition"
        >
          Sign Up
        </button>
      </form>
      <p class="text-center text-sm text-gray-600 mt-4">
        Already have an admin account?
        <a href="admin-login.html" class="text-green-600 hover:underline">Login</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('adminSignUpForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      const name = document.getElementById('adminName').value;
      const email = document.getElementById('adminEmail').value;
      const username = document.getElementById('adminUsername').value;
      const password = document.getElementById('adminPassword').value;
      const confirmPassword = document.getElementById('adminConfirmPassword').value;

      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/admin-signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, username, password })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Admin registered successfully!');
          window.location.href = 'admin-login.html';
        } else {
          alert(data.message || 'Signup failed');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error occurred during signup.');
      }
    });
  </script>
</body>
</html>
