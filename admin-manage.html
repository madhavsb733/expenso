<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      background: url('') no-repeat center center fixed;
      background-size: cover;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
    }
  </style>
</head>
<body class="min-h-screen text-gray-800">

  <!-- Green Blur Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- Navigation Bar -->
  <nav class="w-full bg-white/80 backdrop-blur-md shadow-md fixed top-0 left-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="text-2xl font-bold text-green-600">Expenzo</div>
      <div class="hidden md:flex space-x-6 text-gray-700 font-medium">
        <a href="admin-dash.html" class="hover:text-green-600">Dashboard</a>
        <a href="alogout.html" class="hover:text-green-600">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Spacer for fixed navbar -->
  <div class="pt-24"></div>

  <!-- Main Content -->
  <main class="px-4 max-w-4xl mx-auto py-10">
    <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-8">
      <h2 class="text-2xl font-bold text-green-700 mb-6 text-center">Manage Users Access</h2>

      <div id="userContainer" class="space-y-4">
        <!-- User blocks will be injected here -->
      </div>

      <div class="text-right mt-6">
        <a href="admin-dash.html" class="text-green-600 hover:underline text-sm">← Back to Dashboard</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-green-100 py-10 mt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <div class="mb-4">
        <i class="fas fa-coins text-3xl text-green-600"></i>
        <h3 class="text-2xl font-bold text-green-700 mt-2">Expenzo</h3>
      </div>
      <p class="text-gray-600 text-sm flex justify-center items-center gap-2">
        <i class="far fa-copyright"></i>
        2025 Expenzo. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Script to load and toggle users -->
  <script>
    async function loadUsers() {
      const container = document.getElementById('userContainer');
      container.innerHTML = '';

      const response = await fetch('http://localhost:3000/admin/manage-users');
      const users = await response.json();

      users.forEach((user) => {
        const isAllowed = user.status === 'allowed';

        const userBlock = document.createElement('div');
        userBlock.className = 'flex justify-between items-center border-b pb-4';

        userBlock.innerHTML = `
          <div>
            <p class="font-semibold text-lg">User: ${user.username}</p>
            <p class="text-sm text-gray-500">
              Status:
              <span class="${isAllowed ? 'text-green-600' : 'text-red-600'}">
                ${isAllowed ? 'Allowed' : 'Disabled'}
              </span>
            </p>
          </div>
          <button
            class="${isAllowed ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-green-500 hover:bg-green-600'} 
              text-white px-4 py-2 rounded-md"
            onclick="toggleUserStatus(${user.id}, '${isAllowed ? 'disabled' : 'allowed'}')"
          >
            ${isAllowed ? 'Disable' : 'Enable'}
          </button>
        `;

        container.appendChild(userBlock);
      });
    }

    async function toggleUserStatus(userId, newStatus) {
      const res = await fetch('http://localhost:3000/admin/toggle-user-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, newStatus }),
      });

      const result = await res.json();
      if (result.success) {
        loadUsers();
      } else {
        alert('Failed to update user status.');
      }
    }

    loadUsers();
  </script>
</body>
</html>
