<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Expenzo - Daily Expenses Chart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
   <style>
      body {
        background-color: #9efdb9;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans">

    
    <!-- Navigation Bar -->
    <nav class="w-full bg-white shadow-md fixed top-0 left-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="text-2xl font-bold text-green-600">Expenzo</div>
        <div class="hidden md:flex space-x-6 text-gray-700 font-medium">
          <a href="admin-dash.html" class="hover:text-green-600">Dashboard</a>
          <a href="logout.html" class="hover:text-green-600">Logout</a>
        </div>
      </div>
    </nav>

    <!-- Spacer for fixed navbar -->
    <div class="pt-24"></div>

    <!-- Chart Section -->
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-10">
      <div class="bg-white shadow-xl rounded-3xl p-10">
        <h2 class="text-4xl font-bold text-green-700 text-center mb-12">
          Daily Expenses Overview
        </h2>

        <div class="bg-white p-6 rounded-2xl shadow-md">
          <canvas id="expenseChart" height="120"></canvas>
        </div>

    
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-green-100 py-10 mt-20">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <div class="mb-4">
          <i class="fas fa-coins text-3xl text-green-600"></i>
          <h3 class="text-2xl font-bold text-green-700 mt-2">Expenzo</h3>
        </div>
        <p class="text-gray-600 text-sm flex justify-center items-center gap-2">
          <i class="far fa-copyright"></i>
          2025 Expenzo. All rights reserved.
        </p>
      </div>
    </footer>

    <!-- Chart.js Script -->
    <script>
      async function loadExpenseChart() {
        try {
          const response = await fetch("http://localhost:3000/admin/daily-expenses");
          const data = await response.json();

          const dates = data.map(item => new Date(item.date).toISOString().split('T')[0]);
          const totals = data.map(item => parseFloat(item.total));

          const ctx = document.getElementById("expenseChart").getContext("2d");
          new Chart(ctx, {
            type: "bar",
            data: {
              labels: dates,
              datasets: [{
                label: "Total Expenses (₹)",
                data: totals,
                backgroundColor: "rgba(34, 197, 94, 0.7)",
                borderColor: "rgba(34, 197, 94, 1)",
                borderWidth: 1,
                borderRadius: 6
              }]
            },
            options: {
              responsive: true,
              scales: {
                y: {
                  beginAtZero: true,
                  title: {
                    display: true,
                    text: "Amount (₹)"
                  }
                },
                x: {
                  title: {
                    display: true,
                    text: "Date"
                  }
                }
              },
              plugins: {
                legend: {
                  display: false
                }
              }
            }
          });
        } catch (error) {
          console.error("Error loading chart:", error);
        }
      }

      loadExpenseChart();
    </script>
  </body>
</html>
