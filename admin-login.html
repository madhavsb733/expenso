<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expenzo - Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="relative min-h-screen font-sans flex items-center justify-center px-4">

  <!-- 🌿 Background Green Fade Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- 🧊 Login Box Container with glass effect -->
  <div class="glass w-full max-w-4xl overflow-hidden grid grid-cols-1 md:grid-cols-2 p-4">

    <!-- Left Panel with Illustration -->
    <div class="bg-green-50 flex items-center justify-center p-6 rounded-xl">
      <img src="1000255602.jpg" alt="Admin Illustration" class="w-max h-max" />
    </div>

    <!-- Right Panel - Login Form -->
    <div class="p-10">
      <h2 class="text-3xl font-bold text-green-700 mb-6 text-center">Admin Login</h2>
      <form id="adminLoginForm">
        <div class="mb-6">
          <label for="adminUsername" class="block mb-2 text-lg font-medium">Username</label>
          <input
            type="text"
            id="adminUsername"
            name="adminUsername"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <div class="mb-6">
          <label for="adminPassword" class="block mb-2 text-lg font-medium">Password</label>
          <input
            type="password"
            id="adminPassword"
            name="adminPassword"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-md text-base font-semibold transition">
          Login
        </button>
      </form>
      <p class="text-center text-sm text-gray-600 mt-4">
        Don't have an admin account?
        <a href="admin signup.html" class="text-green-600 hover:underline">Sign up</a>
      </p>
    </div>
  </div>

  <!-- Script for Admin Login -->
  <script>
    document.getElementById("adminLoginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      window.location.href = "admin-dash.html";
    });
  </script>
</body>
</html>
