<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expenzo - User Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="relative min-h-screen text-gray-800">

  <!-- Background image -->
  <div class="fixed inset-0 z-0"
    style="background: url('') no-repeat center center fixed;
           background-size: 80%;">
  </div>

  <!-- Green fade overlay with blur -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- Content -->
  <div class="pt-24 px-4 max-w-xl mx-auto relative z-10">
    <div class="glass p-8">
      <h2 class="text-2xl font-bold text-green-700 mb-4 text-center">User Settings</h2>

      <!-- Show logged in user -->
      <p id="userInfo" class="text-center text-sm text-gray-500 mb-4"></p>

      <form id="updateForm">
        <div class="mb-4">
          <label for="email" class="block text-lg font-medium mb-1">New Email</label>
          <input type="email" id="email" name="email" placeholder="Enter new email"
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400 text-base">
        </div>

        <div class="mb-6">
          <label for="password" class="block text-lg font-medium mb-1">New Password</label>
          <input type="password" id="password" name="password" placeholder="Enter new password"
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400 text-base">
        </div>

        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-md text-base font-semibold transition">
          Update Settings
        </button>
      </form>
    </div>
  </div>

  <!-- JS Scripts -->
  <script>
    async function checkLogin() {
      try {
        const res = await fetch("http://localhost:3000/session-user", {
          method: "GET",
          credentials: "include"
        });

        if (!res.ok) {
          window.location.href = "login1.html";
          return;
        }

        const data = await res.json();
        document.getElementById("userInfo").textContent = `Logged in as User ID: ${data.userId}`;
        window.userId = data.userId;
      } catch (err) {
        console.error("Session check error:", err);
        window.location.href = "login1.html";
      }
    }

    document.getElementById("updateForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email && !password) {
        alert("Please enter either email or password to update.");
        return;
      }

      try {
        const res = await fetch("http://localhost:3000/update-user-settings", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (res.ok) {
          alert(data.message || "Update successful!");
        } else {
          alert(data.message || "Update failed.");
        }
      } catch (err) {
        console.error("Update error:", err);
        alert("Server error during update.");
      }
    });

    checkLogin();
  </script>
</body>
</html>
