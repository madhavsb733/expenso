<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expenzo - Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      background-color: #9efdb9;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="relative min-h-screen font-sans">

  <!-- Green Fade Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <div class="pt-28 px-4">
    <div class="glass max-w-md mx-auto p-8 fade-in">
      <h2 class="text-3xl font-bold text-green-700 mb-6 text-center">Sign Up</h2>
      <form id="signupForm">
        <div class="mb-4">
          <label for="name" class="block mb-2 text-lg font-medium">Full Name</label>
          <input type="text" id="name" name="name" required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base" />
        </div>
        <div class="mb-4">
          <label for="email" class="block mb-2 text-lg font-medium">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base" />
        </div>
        <div class="mb-4">
          <label for="username" class="block mb-2 text-lg font-medium">Username</label>
          <input type="text" id="username" name="username" required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base" />
        </div>
        <div class="mb-6">
          <label for="password" class="block mb-2 text-lg font-medium">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 text-base" />
        </div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-md text-base font-semibold transition">
          Sign Up
        </button>
      </form>
      <p class="text-center text-sm text-gray-600 mt-4">
        Already have an account?
        <a href="login.html" class="text-green-600 hover:underline">Login</a>
      </p>
    </div>
  </div>

  <!-- Signup Script -->
  <script>
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("http://localhost:3000/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, username, password })
        });

        const data = await response.json();

        if (response.ok) {
          alert("Signup successful!");
          window.location.href = "login.html";
        } else {
          alert(data.message || "Signup failed. Please try again.");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Server error. Please try again later.");
      }
    });
  </script>

</body>
</html>
