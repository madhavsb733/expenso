<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expenzo - Logout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      background: url('https://i.pinimg.com/736x/32/32/be/3232be5b6b9993c7f4839c32d28c26aa.jpg') no-repeat center center fixed;
      background-size: 49%;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen text-gray-800">

  <!-- Green Blur Overlay -->
  <div class="fixed inset-0 bg-green-900/40 backdrop-blur-sm -z-10"></div>

  <!-- Navigation Bar -->
  <nav class="w-full bg-white/80 backdrop-blur-md shadow-md fixed top-0 left-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="text-2xl font-bold text-green-600">Expenzo</div>
      <div class="hidden md:flex space-x-6 text-gray-700 font-medium">
        <a href="dash.html" class="hover:text-green-600">Dashboard</a>
        <a href="a.html" class="hover:text-green-600">Add Expense</a>
        <a href="c.html" class="hover:text-green-600">Categorize</a>
        <a href="visual.html" class="hover:text-green-600">Visualization</a>
        <a href="logout.html" class="hover:text-green-600">Logout</a>
      </div>
    </div>
  </nav>
  <br><br>

  <!-- Spacer -->
  <div class="pt-32 px-4 fade-in">
    <div class="max-w-xl mx-auto glass p-8 text-center">
      <i class="fas fa-sign-out-alt text-4xl text-green-600 mb-4"></i>
      <h2 class="text-3xl font-bold text-green-700 mb-4">You have been logged out</h2>
      <p class="text-gray-600 text-base mb-6">
        Thank you for using Expenzo. We hope to see you again soon!
      </p>
      <a
        href="hp.html"
        class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded transition"
      >
        Logout
      </a>
    </div>
  </div>
  <br><br><br><br>

  <!-- Footer (unchanged) -->
  <footer class="bg-green-100 py-10 mt-12">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <div class="mb-4">
        <i class="fas fa-coins text-3xl text-green-600"></i>
        <h3 class="text-2xl font-bold text-green-700 mt-2">Expenzo</h3>
      </div>
      <p class="text-gray-600 text-sm flex justify-center items-center gap-2">
        <i class="far fa-copyright"></i>
        2025 Expenzo. All rights reserved.
      </p>
    </div>
  </footer>
</body>
</html>
